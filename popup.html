<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h2>Ad Skipper Pro</h2>
        <div class="status-box"><p id="status">Status: <span>Active</span></p></div>
        
        <div class="settings-box">
            <label>Ad Speed:</label>
            <select id="speedSelect">
                <option value="16">16x (Fastest)</option>
                <option value="8">8x (Safe)</option>
                <option value="4">4x (Slow)</option>
            </select>
        </div>

        <div class="counter-box"><p>Ads Skipped: <span id="countDisplay">0</span></p></div>
        <button id="toggleBtn">Turn OFF</button>
        <p class="note">Stealth Mode Active 🛡️</p>
    </div>
    <script src="popup.js"></script>
</body>
<p class="credits">Developed by: <b>Saad Malik</b></p>
</html>
